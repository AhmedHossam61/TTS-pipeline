pipeline:
  # Set to null for auto-generated run ID (run_YYYYMMDD_HHMMSS)
  run_id: null
  data_dir: data

# ── Stage 1: Prompt Generation ───────────────────────────────────────────────
generation:
  num_prompts: 10
  gemini_model: gemini-3.0-flash
  expand_with_gemini: false         # false = seed corpus only
  gemini_sentences_per_call: 20     # sentences per API call
  seed_file: data/seeds/seed_sentences.txt
  output_dir: data/prompts
  strip_diacritics: true            # normalize tashkeel before TTS
  domains:
    - conversation
    - shopping
    - transport
    - numbers_and_dates
    - places
    - emotions
    - instructions
    - work
    - technology
    - education
    - health
    - family
    - food
    - weather

# ── Stage 2: TTS Synthesis ────────────────────────────────────────────────────
synthesis:
  batch_size: 10
  max_retries: 3
  audio_dir: data/audio
  manifest_dir: data/manifests
  checkpoint_db: data/synthesis.db
  sample_rate: 24000                # unified output sample rate
  add_noise_ratio: 0.4           # add synthetic noise to this fraction of clips (0.0-1.0)

  engines:
    - name: edge-tts
      enabled: true
      voices:
        - ar-EG-SalmaNeural         # female
        - ar-EG-ShakirNeural        # male

    - name: egtts
      enabled: true
      model_repo: OmarSamir/EGTTS-V0.1
      # Path to a clean 6-12s WAV reference audio (the speaker voice to clone)
      # Run: python scripts/download_references.py  to get sample reference files
      reference_audio: data/references/egtts_reference.wav
      use_deepspeed: false          # deepspeed is unreliable on Windows
      temperature: 0.75
      device: cuda                  # or cpu

    - name: gemini-tts
      enabled: true
      model_name: gemini-3.1-flash-tts-preview
      language_code: ar-EG
      # Uses GOOGLE_CLOUD_PROJECT from config/.env when null.
      project_id: null
      # gemini-3.1-flash-tts-preview is currently listed for Vertex AI global.
      # For europe-west4, use a region-supported model such as gemini-2.5-flash-tts.
      location: global
      temperature: 1.0
      prompt: >
        Read the following text in natural Egyptian Arabic. Keep the wording
        unchanged, use a clear conversational tone, and avoid adding extra words.
      voices:
        - Charon
        - Achernar

    - name: niletts
      enabled: false
      model_repo: KickItLikeShika/NileTTS-XTTS
      reference_audio: data/references/niletts_reference.wav
      use_deepspeed: false
      temperature: 0.70
      device: cuda

    # Google Cloud TTS — set enabled: true and configure credentials in .env
    - name: google-vertex
      enabled: true
      voice_name: ar-EG-Standard-A
      speaking_rate: 1.0

# ── Stage 3: Review UI ───────────────────────────────────────────────────────
review:
  host: 127.0.0.1
  port: 7860
  share: false                      # set true to expose via public gradio link

# ── Automated quality signals ─────────────────────────────────────────────────
quality:
  min_duration_sec: 0.5
  max_duration_sec: 30.0
  min_snr_db: 10.0                  # clips below this are flagged
  max_silence_ratio: 0.35           # leading+trailing silence fraction

# ── Stage 4: Export ───────────────────────────────────────────────────────────
export:
  output_dir: data/export
  train_split: 0.90
  test_split: 0.10
  audio_format: wav
  # include_rejected: false means only "approved" samples are exported
  include_rejected: false
